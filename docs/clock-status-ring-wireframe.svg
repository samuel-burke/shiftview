<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" font-family="Inter, Arial, sans-serif">
  <defs>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="960" height="620" fill="#04070f"/>
  <text x="480" y="48" fill="#f8fafc" font-size="26" font-weight="800" text-anchor="middle">ShiftView · Ambient Clock-Status Ring</text>
  <text x="480" y="76" fill="#64748b" font-size="14" text-anchor="middle">A soft edge glow visible on every screen — shows status at a glance, vanishes when off-shift</text>

  <!-- ===== Phone 1: Clocked In (green) ===== -->
  <g transform="translate(70,120)">
    <rect width="240" height="440" rx="34" fill="#080f1e" stroke="#1e293b" stroke-width="2"/>
    <!-- green ring -->
    <rect x="3" y="3" width="234" height="434" rx="31" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.9" filter="url(#glowGreen)"/>
    <rect x="9" y="9" width="222" height="422" rx="27" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
    <!-- content -->
    <rect x="30" y="40" width="180" height="40" rx="12" fill="#111827"/>
    <text x="120" y="65" fill="#94a3b8" font-size="12" text-anchor="middle">Time Clock</text>
    <rect x="30" y="96" width="180" height="120" rx="16" fill="#111827"/>
    <circle cx="60" cy="130" r="5" fill="#22c55e" filter="url(#glowGreen)"/>
    <text x="74" y="134" fill="#22c55e" font-size="13" font-weight="700">Clocked In</text>
    <text x="120" y="180" fill="#f8fafc" font-size="26" font-weight="800" text-anchor="middle">04:12:38</text>
    <text x="120" y="200" fill="#64748b" font-size="10" text-anchor="middle">Total time worked today</text>
    <rect x="30" y="236" width="84" height="40" rx="12" fill="#3a2d0a"/>
    <text x="72" y="261" fill="#f59e0b" font-size="11" font-weight="700" text-anchor="middle">Start Break</text>
    <rect x="126" y="236" width="84" height="40" rx="12" fill="#1e293b"/>
    <text x="168" y="261" fill="#cbd5e1" font-size="11" font-weight="700" text-anchor="middle">End Shift</text>
    <text x="120" y="470" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">Clocked In → green</text>
  </g>

  <!-- ===== Phone 2: On Break (amber) ===== -->
  <g transform="translate(360,120)">
    <rect width="240" height="440" rx="34" fill="#080f1e" stroke="#1e293b" stroke-width="2"/>
    <rect x="3" y="3" width="234" height="434" rx="31" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.9" filter="url(#glowAmber)"/>
    <rect x="9" y="9" width="222" height="422" rx="27" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <rect x="30" y="40" width="180" height="40" rx="12" fill="#111827"/>
    <text x="120" y="65" fill="#94a3b8" font-size="12" text-anchor="middle">Time Clock</text>
    <rect x="30" y="96" width="180" height="120" rx="16" fill="#111827"/>
    <circle cx="60" cy="130" r="5" fill="#f59e0b" filter="url(#glowAmber)"/>
    <text x="74" y="134" fill="#f59e0b" font-size="13" font-weight="700">On Break</text>
    <text x="120" y="180" fill="#f59e0b" font-size="26" font-weight="800" text-anchor="middle">00:14:02</text>
    <text x="120" y="200" fill="#64748b" font-size="10" text-anchor="middle">Current break duration</text>
    <rect x="30" y="236" width="180" height="40" rx="12" fill="#f59e0b"/>
    <text x="120" y="261" fill="#ffffff" font-size="12" font-weight="800" text-anchor="middle">End Break</text>
    <text x="120" y="470" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">On Break → amber</text>
  </g>

  <!-- ===== Phone 3: Clocked Out (no ring) ===== -->
  <g transform="translate(650,120)">
    <rect width="240" height="440" rx="34" fill="#080f1e" stroke="#1e293b" stroke-width="2"/>
    <rect x="30" y="40" width="180" height="40" rx="12" fill="#111827"/>
    <text x="120" y="65" fill="#94a3b8" font-size="12" text-anchor="middle">Time Clock</text>
    <rect x="30" y="96" width="180" height="120" rx="16" fill="#111827"/>
    <circle cx="60" cy="130" r="5" fill="#94a3b8"/>
    <text x="74" y="134" fill="#94a3b8" font-size="13" font-weight="700">Clocked Out</text>
    <text x="120" y="180" fill="#94a3b8" font-size="16" font-weight="700" text-anchor="middle">See you next time!</text>
    <rect x="30" y="236" width="180" height="40" rx="12" fill="#22c55e"/>
    <text x="120" y="261" fill="#ffffff" font-size="12" font-weight="800" text-anchor="middle">Clock In</text>
    <text x="120" y="470" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">Off-shift → no ring</text>
  </g>
</svg>
